openapi: 3.0.3
info:
  title: Cosmosh Local API
  version: 0.1.0
  description: |
    Internal local API used by Cosmosh. In Electron runtime, requests must be proxied by main process.
servers:
  - url: http://127.0.0.1:{port}
    variables:
      port:
        default: "3000"
security:
  - CosmoshInternalToken: []
paths:
  /api/health:
    get:
      tags:
        - system
      summary: Backend liveness check.
      operationId: health
      security: []
      responses:
        "200":
          description: Backend service is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/test/ping:
    get:
      tags:
        - test
      summary: Connectivity smoke test for renderer -> main -> backend chain.
      operationId: testPing
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      responses:
        "200":
          description: Successful ping response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPingSuccess"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/settings:
    get:
      tags:
        - settings
      summary: Get application settings.
      operationId: settingsGet
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      responses:
        "200":
          description: Settings fetched.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsGetSuccess"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      tags:
        - settings
      summary: Update application settings.
      operationId: settingsUpdate
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdateRequest"
      responses:
        "200":
          description: Settings updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsUpdateSuccess"
        "400":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/ssh/servers:
    get:
      tags:
        - ssh
      summary: List SSH servers.
      operationId: sshListServers
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      responses:
        "200":
          description: SSH servers listed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshServerListSuccess"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags:
        - ssh
      summary: Create SSH server configuration.
      operationId: sshCreateServer
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SshServerCreateRequest"
      responses:
        "200":
          description: SSH server created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshServerCreateSuccess"
        "400":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict with existing server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/ssh/servers/{serverId}:
    put:
      tags:
        - ssh
      summary: Update SSH server configuration.
      operationId: sshUpdateServer
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SshServerCreateRequest"
      responses:
        "200":
          description: SSH server updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshServerUpdateSuccess"
        "400":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: SSH server not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict with existing server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/ssh/servers/{serverId}/credentials:
    get:
      tags:
        - ssh
      summary: Get SSH server credentials for editor form prefill.
      operationId: sshGetServerCredentials
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSH server credentials fetched.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshServerCredentialsSuccess"
        "404":
          description: SSH server not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags:
        - ssh
      summary: Delete SSH server configuration.
      operationId: sshDeleteServer
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: SSH server deleted.
        "404":
          description: SSH server not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/ssh/folders:
    get:
      tags:
        - ssh
      summary: List SSH folders.
      operationId: sshListFolders
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      responses:
        "200":
          description: SSH folders listed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshFolderListSuccess"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags:
        - ssh
      summary: Create SSH folder.
      operationId: sshCreateFolder
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SshFolderCreateRequest"
      responses:
        "200":
          description: SSH folder created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshFolderCreateSuccess"
        "400":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Folder already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/ssh/folders/{folderId}:
    put:
      tags:
        - ssh
      summary: Update SSH folder.
      operationId: sshUpdateFolder
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SshFolderUpdateRequest"
      responses:
        "200":
          description: SSH folder updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshFolderUpdateSuccess"
        "400":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: SSH folder not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Folder already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags:
        - ssh
      summary: Delete SSH folder.
      operationId: sshDeleteFolder
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: SSH folder deleted.
        "404":
          description: SSH folder not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/ssh/tags:
    get:
      tags:
        - ssh
      summary: List SSH tags.
      operationId: sshListTags
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      responses:
        "200":
          description: SSH tags listed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshTagListSuccess"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags:
        - ssh
      summary: Create SSH tag.
      operationId: sshCreateTag
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SshTagCreateRequest"
      responses:
        "200":
          description: SSH tag created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshTagCreateSuccess"
        "400":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Tag already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/ssh/sessions:
    post:
      tags:
        - ssh
      summary: Create a live SSH terminal session.
      operationId: sshCreateSession
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SshSessionCreateRequest"
      responses:
        "200":
          description: SSH session is ready for websocket streaming.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshSessionCreateSuccess"
        "400":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Server not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Host fingerprint is not trusted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshHostVerificationRequired"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/ssh/sessions/{sessionId}:
    delete:
      tags:
        - ssh
      summary: Close a live SSH terminal session.
      operationId: sshCloseSession
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Session closed.
        "404":
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/ssh/trusted-host-keys:
    post:
      tags:
        - ssh
      summary: Trust a host fingerprint for a server.
      operationId: sshTrustFingerprint
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SshTrustFingerprintRequest"
      responses:
        "200":
          description: Host fingerprint has been trusted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshTrustFingerprintSuccess"
        "400":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Server not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/local-terminals/profiles:
    get:
      tags:
        - local-terminal
      summary: List local terminal profiles available on host.
      operationId: localTerminalListProfiles
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      responses:
        "200":
          description: Local terminal profiles listed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalTerminalProfileListSuccess"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/local-terminals/sessions:
    post:
      tags:
        - local-terminal
      summary: Create a live local terminal session.
      operationId: localTerminalCreateSession
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocalTerminalSessionCreateRequest"
      responses:
        "200":
          description: Local terminal session is ready for websocket streaming.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalTerminalSessionCreateSuccess"
        "400":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Profile not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/local-terminals/sessions/{sessionId}:
    delete:
      tags:
        - local-terminal
      summary: Close a live local terminal session.
      operationId: localTerminalCloseSession
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Session closed.
        "404":
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  securitySchemes:
    CosmoshInternalToken:
      type: apiKey
      in: header
      name: x-cosmosh-internal-token
  parameters:
    LocaleHeader:
      name: x-cosmosh-locale
      in: header
      required: false
      schema:
        type: string
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          enum: ["ok"]
        timestamp:
          type: string
          format: date-time
    ApiMeta:
      type: object
      required:
        - code
        - message
        - requestId
        - timestamp
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time
    ApiError:
      allOf:
        - $ref: "#/components/schemas/ApiMeta"
        - type: object
          required:
            - success
            - code
          properties:
            code:
              type: string
              enum:
                [
                  "COMMON_INTERNAL_SERVER_ERROR",
                  "AUTH_INVALID_TOKEN",
                  "SETTINGS_VALIDATION_FAILED",
                  "SSH_VALIDATION_FAILED",
                  "SSH_SERVER_CONFLICT",
                  "SSH_FOLDER_CONFLICT",
                  "SSH_TAG_CONFLICT",
                  "SSH_NOT_FOUND",
                  "SSH_HOST_UNTRUSTED",
                  "SSH_SESSION_NOT_FOUND",
                  "LOCAL_TERMINAL_VALIDATION_FAILED",
                  "LOCAL_TERMINAL_PROFILE_NOT_FOUND",
                ]
            success:
              type: boolean
              enum: [false]
    SshAuthType:
      type: string
      enum: ["password", "key", "both"]
    TestPingData:
      type: object
      required:
        - service
        - mode
        - authenticated
        - capabilities
      properties:
        service:
          type: string
          enum: ["cosmosh-backend"]
        mode:
          type: string
          enum: ["electron-main", "standalone"]
        authenticated:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
            enum: ["ssh", "sftp"]
          minItems: 2
          maxItems: 2
    TestPingSuccess:
      allOf:
        - $ref: "#/components/schemas/ApiMeta"
        - type: object
          required:
            - success
            - data
            - code
          properties:
            code:
              type: string
              enum: ["TEST_PING_OK"]
            success:
              type: boolean
              enum: [true]
            data:
              $ref: "#/components/schemas/TestPingData"
    SettingsValues:
      type: object
      description: >
        Application settings values. Property definitions, types, defaults,
        constraints, and enum sets are managed by the settings registry at
        packages/api-contract/src/settings-registry.ts.
        This schema is intentionally loose; runtime validation lives in code.
      additionalProperties: true
    SettingsScope:
      type: object
      required:
        - deviceId
      properties:
        accountId:
          type: string
        deviceId:
          type: string
          minLength: 1
          maxLength: 120
    SettingsResource:
      type: object
      required:
        - scope
        - revision
        - updatedAt
        - values
      properties:
        scope:
          $ref: "#/components/schemas/SettingsScope"
        revision:
          type: integer
          minimum: 0
        updatedAt:
          type: string
          format: date-time
        values:
          $ref: "#/components/schemas/SettingsValues"
    SettingsGetData:
      type: object
      required:
        - item
      properties:
        item:
          $ref: "#/components/schemas/SettingsResource"
    SettingsUpdateRequest:
      type: object
      required:
        - values
      properties:
        scope:
          $ref: "#/components/schemas/SettingsScope"
        values:
          $ref: "#/components/schemas/SettingsValues"
    SettingsUpdateData:
      type: object
      required:
        - item
      properties:
        item:
          $ref: "#/components/schemas/SettingsResource"
    SshFolder:
      type: object
      required:
        - id
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        note:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SshTag:
      type: object
      required:
        - id
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SshLoginAudit:
      type: object
      required:
        - id
        - attemptedAt
        - result
        - commandCount
      properties:
        id:
          type: string
        attemptedAt:
          type: string
          format: date-time
        result:
          type: string
          enum: ["success", "failed"]
        failureReason:
          type: string
        clientIp:
          type: string
        sessionId:
          type: string
        sessionStartedAt:
          type: string
          format: date-time
        sessionEndedAt:
          type: string
          format: date-time
        commandCount:
          type: integer
          minimum: 0
    SshServerListItem:
      type: object
      required:
        - id
        - name
        - host
        - port
        - username
        - authType
        - hasPassword
        - hasPrivateKey
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        host:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        username:
          type: string
        authType:
          $ref: "#/components/schemas/SshAuthType"
        hasPassword:
          type: boolean
        hasPrivateKey:
          type: boolean
        note:
          type: string
        folder:
          $ref: "#/components/schemas/SshFolder"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/SshTag"
        systemHostname:
          type: string
        systemOs:
          type: string
        systemArch:
          type: string
        systemKernel:
          type: string
        lastSystemSyncAt:
          type: string
          format: date-time
        lastLoginAudit:
          $ref: "#/components/schemas/SshLoginAudit"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SshServerCreateRequest:
      type: object
      required:
        - name
        - host
        - port
        - username
        - authType
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        host:
          type: string
          minLength: 1
          maxLength: 255
        port:
          type: integer
          minimum: 1
          maximum: 65535
        username:
          type: string
          minLength: 1
          maxLength: 120
        authType:
          $ref: "#/components/schemas/SshAuthType"
        password:
          type: string
          minLength: 1
        privateKey:
          type: string
          minLength: 1
        privateKeyPassphrase:
          type: string
          minLength: 1
        folderId:
          type: string
        tagIds:
          type: array
          items:
            type: string
        note:
          type: string
          maxLength: 3000
    SshFolderCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        note:
          type: string
          maxLength: 1000
    SshFolderUpdateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        note:
          type: string
          maxLength: 1000
    SshTagCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
    SshSessionCreateRequest:
      type: object
      required:
        - serverId
      properties:
        serverId:
          type: string
        cols:
          type: integer
          minimum: 20
          maximum: 400
          default: 120
        rows:
          type: integer
          minimum: 10
          maximum: 200
          default: 32
        term:
          type: string
          minLength: 2
          maxLength: 64
          default: xterm-256color
        connectTimeoutSec:
          type: integer
          minimum: 5
          maximum: 180
          default: 45
    SshTrustFingerprintRequest:
      type: object
      required:
        - serverId
        - fingerprintSha256
      properties:
        serverId:
          type: string
        fingerprintSha256:
          type: string
          minLength: 1
          maxLength: 255
        algorithm:
          type: string
