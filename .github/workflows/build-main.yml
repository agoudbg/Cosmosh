name: Build Main

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-main:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build main
        run: pnpm --filter @cosmosh/main build
      - name: Upload main installers
        uses: actions/upload-artifact@v4
        with:
          name: cosmosh-main-installers-${{ matrix.os }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            packages/main/release/**/*.exe
            packages/main/release/**/*.dmg
            packages/main/release/**/*.zip
            packages/main/release/**/*.AppImage
            packages/main/release/**/*.deb
